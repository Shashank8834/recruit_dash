services:
  backend:
    build:
      context: ./backend
    container_name: recruitment-backend
    restart: unless-stopped
    environment:
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GOOGLE_SERVICE_ACCOUNT_KEY=${GOOGLE_SERVICE_ACCOUNT_KEY}
      - PORT=3001
    volumes:
      # Mount the service account key file if providing a path
      - ${SERVICE_ACCOUNT_KEY_FILE:-/dev/null}:/app/service-account.json:ro
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
    container_name: recruitment-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
